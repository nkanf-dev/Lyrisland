name: Lyrisland
options:
  bundleIdPrefix: com.wangjiyuan
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.35"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""

targets:
  Lyrisland:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjiyuan.Lyrisland
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/Lyrisland.entitlements
        ENABLE_HARDENED_RUNTIME: true
    preBuildScripts:
      - script: |
          if which swiftformat >/dev/null; then
            swiftformat "$SRCROOT/Sources"
          else
            echo "warning: SwiftFormat not installed, run 'brew install swiftformat'"
          fi
        name: SwiftFormat
      - script: |
          if which swiftlint >/dev/null; then
            swiftlint --fix "$SRCROOT/Sources" && swiftlint "$SRCROOT/Sources"
          else
            echo "warning: SwiftLint not installed, run 'brew install swiftlint'"
          fi
        name: SwiftLint
    entitlements:
      path: Sources/App/Lyrisland.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
        com.apple.security.network.client: true
