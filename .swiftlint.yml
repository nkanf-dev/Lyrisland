included:
  - Sources

excluded:
  - .build

disabled_rules:
  - trailing_comma
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - discouraged_optional_boolean
  - fatal_error_message
  - first_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - sorted_first_last
  - yoda_condition

identifier_name:
  min_length: 1

line_length:
  warning: 140
  error: 250
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100
