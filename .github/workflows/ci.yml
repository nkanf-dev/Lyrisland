name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-and-test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen swiftformat swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Check formatting
        run: |
          if ! swiftformat --lint Sources Tests; then
            echo "::error::SwiftFormat found formatting issues. Run 'swiftformat Sources Tests' locally to fix."
            exit 1
          fi

      - name: Lint
        run: swiftlint lint --strict Sources Tests

      - name: Build app
        run: |
          xcodebuild -project Lyrisland.xcodeproj \
            -scheme Lyrisland \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run tests
        run: |
          xcodebuild test \
            -project Lyrisland.xcodeproj \
            -scheme Lyrisland \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
