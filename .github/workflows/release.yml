name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Release
        run: |
          xcodebuild -project Lyrisland.xcodeproj \
            -scheme Lyrisland \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Generate DMG background
        run: swift Scripts/generate-dmg-background.swift /tmp/dmg-background.png 660 400

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/Lyrisland.app"
          # create-dmg returns exit code 2 when signing is skipped — that's expected
          create-dmg \
            --volname "Lyrisland" \
            --background /tmp/dmg-background.png \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "Lyrisland.app" 170 190 \
            --app-drop-link 490 190 \
            --hide-extension "Lyrisland.app" \
            --no-internet-enable \
            "Lyrisland-${{ steps.version.outputs.version }}.dmg" \
            "$APP_PATH" \
          || test $? -eq 2

      - name: Package zip (for Homebrew)
        run: |
          APP_PATH="build/Build/Products/Release/Lyrisland.app"
          ditto -c -k --keepParent "$APP_PATH" "Lyrisland-${{ steps.version.outputs.version }}.zip"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lyrisland-${{ steps.version.outputs.version }}
          path: |
            Lyrisland-${{ steps.version.outputs.version }}.dmg
            Lyrisland-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          draft: false
          generate_release_notes: true
          files: |
            Lyrisland-${{ steps.version.outputs.version }}.dmg
            Lyrisland-${{ steps.version.outputs.version }}.zip

  update-homebrew:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for release asset to be available
        run: |
          URL="https://github.com/EurFelux/Lyrisland/releases/download/${GITHUB_REF_NAME}/Lyrisland-${{ steps.version.outputs.version }}.zip"
          for i in $(seq 1 10); do
            if curl -fsSL -o /tmp/lyrisland.zip "$URL"; then
              echo "Downloaded successfully"
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(sha256sum /tmp/lyrisland.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/EurFelux/homebrew-lyrisland.git /tmp/tap
          cd /tmp/tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/lyrisland.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/lyrisland.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/lyrisland.rb
          git commit -m "Update Lyrisland to ${VERSION}"
          git push
